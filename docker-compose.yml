version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rainecho-backend
    ports:
      - "8000:8000"
    # Optional: Map your local backend code to the container for live reloading
    # volumes:
    #   - ./backend:/app
    #   - /app/.venv
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rainecho-frontend
    ports:
      - "80:80"   # Maps your machine's port 80 to the Nginx port 80
    depends_on:
      - backend
    restart: unless-stopped
